<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://renecss.org/rene.css" />
    <script src-path="./icons/" src="https://bicyclesystems.github.io/svg-icon/svg-icon.js"></script>
    <script type="module" src="./icons.js"></script>
    <title>Raincons</title>
  </head>
  <body>
    <div class="view column align-center justify-center">
      <div class="page gap-xl">
        <div class="box-l column gap-m">
          <div class="box column">
            <h1>Raincons</h1>
            <h4>12x12 icons designed for clean, minimal, and info-rich interfaces.</h4>
          </div>
        </div>
        <div>
          <input
            style="border: none; border-bottom: 1px solid; padding: 0;"
            id="searchInput"
            type="text"
            placeholder="Search"
          />
        </div>
        <div id="content" class="box-l gap-xl column" style="flex-wrap: wrap;"></div>
        <div class="gap-m">
          <a href="https://github.com/rnbwdev/raincons">GitHub</a>
        </div>
      </div>
    </div>
  </body>
</html>
